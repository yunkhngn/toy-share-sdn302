version: "3.9"

services:
  server:
    build: ./server
    restart: unless-stopped
    environment:
      PORT: 5001
      # Mongo chạy trực tiếp trên máy host (không container hoá)
      MONGO_URI: mongodb://host.containers.internal:27017/toy-share
      CLIENT_ORIGIN: http://localhost:5173
    volumes:
      - ./server:/app
      - /app/node_modules
    ports:
      - "5001:5001"

  client:
    build: ./client
    restart: unless-stopped
    environment:
      VITE_API_PROXY_TARGET: http://server:5001
    volumes:
      - ./client:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - server
